<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>G12++ Exam Processing Suite — Hi-Fi (Batch 2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Sofia+Sans:wght@400;500;600;700;800&family=Yellowtail&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hf.jsx"></script>
<script type="text/babel" src="hfEntry.jsx"></script>
<script type="text/babel" src="hfCycles2.jsx"></script>
<script type="text/babel" src="hfCerts.jsx"></script>
<script type="text/babel" src="hfAnalytics.jsx"></script>
<script type="text/babel" src="hfSettings.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="entry" title="Entry" subtitle="Invite-only access via Microsoft.">
        <DCArtboard id="e1" label="Sign-in" width={1180} height={760}><HFSignin /></DCArtboard>
        <DCArtboard id="e2" label="Access denied (authenticated, not invited)" width={1180} height={760}><HFDenied /></DCArtboard>
      </DCSection>

      <DCSection id="cycles" title="Cycles area" subtitle="New screens within a cycle. Nav: rail = Cycles · Analytics · Settings; in-cycle tabs = Pipeline · Audit log · Certificates.">
        <DCArtboard id="c1" label="Start a new cycle" width={1180} height={740}><HFNewCycle /></DCArtboard>
        <DCArtboard id="c2" label="Audit log" width={1180} height={800}><HFAudit /></DCArtboard>
        <DCArtboard id="c3" label="Certificates · Upload & generate (interactive)" width={1180} height={820}><HFCertGenerate /></DCArtboard>
        <DCArtboard id="c4" label="Certificates · Results" width={1180} height={800}><HFCertResults /></DCArtboard>
      </DCSection>

      <DCSection id="analytics" title="Analytics area" subtitle="Cross-cycle trends and side-by-side comparison.">
        <DCArtboard id="a1" label="Trends" width={1180} height={900}><HFTrends /></DCArtboard>
        <DCArtboard id="a2" label="Compare cycles" width={1180} height={840}><HFCompare /></DCArtboard>
      </DCSection>

      <DCSection id="settings" title="Settings area" subtitle="People, permissions, and configuration.">
        <DCArtboard id="s1" label="Users & access" width={1180} height={720}><HFUsers /></DCArtboard>
        <DCArtboard id="s2" label="Roles & permissions" width={1180} height={940}><HFRoles /></DCArtboard>
        <DCArtboard id="s3" label="Configuration" width={1180} height={760}><HFConfig /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
